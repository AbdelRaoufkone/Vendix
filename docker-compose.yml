# ══════════════════════════════════════════════════════════════
#  VENDIX — Docker Compose PRODUCTION
#  Usage : docker compose up -d
# ══════════════════════════════════════════════════════════════

services:

  # ── Base de données PostgreSQL ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vendix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-vendix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vendixpass}
      POSTGRES_DB:       ${POSTGRES_DB:-vendix}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vendix-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vendix}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Cache Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vendix-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    networks:
      - vendix-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ─────────────────────────────────────────────
  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: vendix-backend
    restart: unless-stopped
    environment:
      NODE_ENV:             production
      PORT:                 5000
      DATABASE_URL:         postgresql://${POSTGRES_USER:-vendix}:${POSTGRES_PASSWORD:-vendixpass}@postgres:5432/${POSTGRES_DB:-vendix}
      REDIS_URL:            redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      JWT_ACCESS_SECRET:    ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET requis}
      JWT_REFRESH_SECRET:   ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET requis}
      FRONTEND_URL:         ${FRONTEND_URL:-http://localhost}
      SMTP_HOST:            ${SMTP_HOST:-}
      SMTP_PORT:            ${SMTP_PORT:-587}
      SMTP_USER:            ${SMTP_USER:-}
      SMTP_PASS:            ${SMTP_PASS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vendix-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Frontend Next.js PWA ────────────────────────────────────
  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    container_name: vendix-frontend
    restart: unless-stopped
    environment:
      NODE_ENV:              production
      NEXT_PUBLIC_API_URL:   ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - vendix-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Reverse Proxy Nginx ─────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: vendix-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - vendix-network

# ── Volumes persistants ─────────────────────────────────────
volumes:
  postgres_data:
    name: vendix-postgres-data
  redis_data:
    name: vendix-redis-data

# ── Réseau interne isolé ────────────────────────────────────
networks:
  vendix-network:
    name: vendix-network
    driver: bridge
